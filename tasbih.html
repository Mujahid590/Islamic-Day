<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ইসলামিক অ্যাপস | তাসবিহ কাউন্টার</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tasbih.css">
</head>
<body>

<!-- ডেস্কটপ টপ নেভবার -->
<nav class="top-navbar">
    <div class="nav-brand">
        <div class="brand-logo">
            <img src="image/Logo.png" alt="Logo" class="brand-logo-img" onerror="this.src='https://placehold.co/38x38?text=LOGO'">
        </div>
        <h1>ইসলামিক অ্যাপস</h1>
    </div>
    <div class="nav-links desktop-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
        <a href="salah.html" class="nav-link"><i class="fas fa-mosque"></i></a>
        <a href="quran.html" class="nav-link"><i class="fas fa-quran"></i></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user"></i></a>
        <a href="#" class="nav-link" id="desktopMoreBtn"><i class="fas fa-ellipsis-h"></i></a>
    </div>
    <div class="nav-actions">
        <button class="settings-btn" id="settingsBtn"><i class="fas fa-cog"></i></button>
    </div>
</nav>

<!-- মোবাইল কন্টেইনার -->
<div class="mobile-container" id="mobileContainer">
    <!-- মসজিদের ছবি হেডার -->
    <div class="mosque-header">
        <div class="mosque-overlay"></div>
        <div class="header-content">
            <button class="mobile-settings-btn" id="mobileSettingsBtn">
                <i class="fas fa-cog"></i>
            </button>
            <div class="welcome-section">
                <h2>দৈনিক তাসবিহ</h2>
                <p>আল্লাহর জিকির করুন</p>
            </div>
        </div>
    </div>

    <!-- তাসবিহ কাউন্টার কার্ড -->
    <div class="tasbih-container">
        <div class="tasbih-card">
            <div class="tasbih-icon">
                <i class="fas fa-praying-hands"></i>
            </div>
            <div class="tasbih-counter" id="counter">0</div>
            <div class="tasbih-text">তাসবিহ</div>
            <div class="tasbih-buttons">
                <button class="tasbih-btn reset-btn" id="resetBtn">
                    <i class="fas fa-undo-alt"></i>
                    <span>রিসেট</span>
                </button>
                <button class="tasbih-btn count-btn" id="countBtn">
                    <i class="fas fa-plus-circle"></i>
                    <span>গুণুন</span>
                </button>
            </div>
        </div>

        <!-- তাসবিহের ধাপসমূহ -->
        <div class="tasbih-steps">
            <div class="step-item" id="step1">
                <div class="step-count" id="step1Count">0</div>
                <div class="step-text">সুবহানাল্লাহ</div>
                <div class="step-target">৩৩ বার</div>
            </div>
            <div class="step-item" id="step2">
                <div class="step-count" id="step2Count">0</div>
                <div class="step-text">আলহামদুলিল্লাহ</div>
                <div class="step-target">৩৩ বার</div>
            </div>
            <div class="step-item" id="step3">
                <div class="step-count" id="step3Count">0</div>
                <div class="step-text">আল্লাহু আকবার</div>
                <div class="step-target">৩৪ বার</div>
            </div>
        </div>

        <!-- দ্রুত তাসবিহ বাটন -->
        <div class="quick-tasbih">
            <button class="quick-btn" data-value="سبحان الله">সুবহানাল্লাহ</button>
            <button class="quick-btn" data-value="الحمد لله">আলহামদুলিল্লাহ</button>
            <button class="quick-btn" data-value="الله أكبر">আল্লাহু আকবার</button>
            <button class="quick-btn" data-value="لا إله إلا الله">লা ইলাহা ইল্লাল্লাহ</button>
        </div>
    </div>
</div>

<!-- মোবাইল বটম নেভিগেশন বার -->
<div class="bottom-nav-mobile">
    <a href="profile.html" class="bottom-nav-item" data-page="profile">
        <img src="image/profile.png" alt="প্রোফাইল" class="bottom-nav-img" onerror="this.src='https://placehold.co/30x30?text=👤'">
    </a>
    <a href="tasbih.html" class="bottom-nav-item home-center active" data-page="tasbih">
        <img src="image/tasbih.png" alt="তাসবিহ" class="bottom-nav-img" onerror="this.src='https://placehold.co/35x35?text=📿'">
    </a>
    <a href="index.html" class="bottom-nav-item" data-page="home">
        <img src="image/Logo.png" alt="হোম" class="bottom-nav-img" onerror="this.src='https://placehold.co/30x30?text=🏠'">
    </a>
    <a href="quran.html" class="bottom-nav-item" data-page="quran">
        <img src="image/quran.png" alt="কুরআন" class="bottom-nav-img" onerror="this.src='https://placehold.co/30x30?text=📖'">
    </a>
    <a href="#" class="bottom-nav-item" id="mobileMoreBtn" data-page="more">
        <i class="fas fa-ellipsis-h bottom-nav-icon"></i>
    </a>
</div>

<!-- সেটিংস প্যানেল -->
<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
        <button class="close-settings" id="closeSettingsBtn">&times;</button>
    </div>
    <div class="settings-body">
        <div class="setting-item">
            <label><i class="fas fa-palette"></i> থিম নির্বাচন করুন</label>
            <div class="theme-controls">
                <button class="theme-btn active" data-theme="light"><i class="fas fa-sun"></i> মিল্কি মোড</button>
                <button class="theme-btn" data-theme="dark"><i class="fas fa-moon"></i> নাইট মোড</button>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>

        <h3><i class="fas fa-list"></i> অন্যান্য সেবা</h3>
        <button class="close-more-menu" id="closeMoreMenuBtn">&times;</button>
    </div>
    <div class="more-menu-items">
        <a href="asmaul_husna.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><img src="image/asmaul_husna.png" alt="আসমাউল হুসনা" class="menu-icon-img" onerror="this.src='https://placehold.co/30x30?text=⭐'"></div>
            <span>আসমা-উল-হুসনা</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="compass.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><img src="image/compass.png" alt="কিবলা কম্পাস" class="menu-icon-img" onerror="this.src='https://placehold.co/30x30?text=🧭'"></div>
            <span>কিবলা কম্পাস</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="calendar.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><img src="image/calendar.png" alt="ইসলামিক ক্যালেন্ডার" class="menu-icon-img" onerror="this.src='https://placehold.co/30x30?text=📅'"></div>
            <span>ইসলামিক ক্যালেন্ডার</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="mosque_finder.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><img src="image/mosque.png" alt="মসজিদ ফাইন্ডার" class="menu-icon-img" onerror="this.src='https://placehold.co/30x30?text=🕌'"></div>
            <span>মসজিদ ফাইন্ডার</span>

        <a href="hadith.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><img src="image/hadith.png" alt="হাদিস" class="menu-icon-img" onerror="this.src='https://placehold.co/30x30?text=📚'"></div>
            <span>হাদিস শরীফ</span>
            <i class="fas fa-chevron-right"></i>
        </a>
        <a href="ablution.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><i class="fas fa-hand-holding-water"></i></div>

        <a href="tasbih.html" class="more-menu-item">
            <div class="menu-icon-wrapper"><img src="image/tasbih.png" alt="তাসবিহ" class="menu-icon-img" onerror="this.src='https://placehold.co/30x30?text=📿'"></div>
            <span>তাসবিহ</span>
            <i class="fas fa-chevron-right"></i>
        </a>
    </div>
</div>

<script src="js/tasbih.js"></script>
</body>
